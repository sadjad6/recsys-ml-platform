apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: recsys
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: mlflow:latest
          ports:
            - containerPort: 5000
