# =============================================================================
# RecSys ML Platform — Docker Compose
# =============================================================================
# Task 01: Kafka Event Streaming Infrastructure
# Start with: docker-compose up -d zookeeper kafka
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Zookeeper — Kafka coordination
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: recsys-zookeeper
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - recsys-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Kafka Broker — Event streaming platform
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: recsys-kafka
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID:-1}
      KAFKA_ZOOKEEPER_CONNECT: ${KAFKA_ZOOKEEPER_CONNECT:-zookeeper:2181}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS:-PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:-PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT}
      KAFKA_INTER_BROKER_LISTENER_NAME: ${KAFKA_INTER_BROKER_LISTENER_NAME:-PLAINTEXT}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:-1}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - recsys-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Kafka Topic Initializer — Creates required topics on startup
  # ---------------------------------------------------------------------------
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: recsys-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./kafka/topics/create_topics.sh:/create_topics.sh
    entrypoint: ["/bin/bash", "/create_topics.sh"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      KAFKA_TOPIC_PARTITIONS: ${KAFKA_TOPIC_PARTITIONS:-3}
      KAFKA_TOPIC_REPLICATION_FACTOR: ${KAFKA_TOPIC_REPLICATION_FACTOR:-1}
    networks:
      - recsys-network

  # ---------------------------------------------------------------------------
  # Kafka Event Producer — Simulates user interactions
  # ---------------------------------------------------------------------------
  kafka-producer:
    build:
      context: ./kafka
      dockerfile: Dockerfile
    container_name: recsys-kafka-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      KAFKA_TOPIC_USER_EVENTS: ${KAFKA_TOPIC_USER_EVENTS:-user-events}
      PRODUCER_EVENTS_PER_SECOND: ${PRODUCER_EVENTS_PER_SECOND:-10}
      PRODUCER_NUM_USERS: ${PRODUCER_NUM_USERS:-1000}
      PRODUCER_NUM_ITEMS: ${PRODUCER_NUM_ITEMS:-500}
    command: ["python", "-m", "producers.event_producer"]
    networks:
      - recsys-network
    restart: unless-stopped
    profiles:
      - producer

  # ---------------------------------------------------------------------------
  # Spark Master
  # ---------------------------------------------------------------------------
  spark-master:
    image: bitnami/spark:3.5.0
    container_name: recsys-spark-master
    hostname: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./data:/app/data
      - ./spark:/app/spark
      - ./kafka:/app/kafka
    networks:
      - recsys-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Spark Worker
  # ---------------------------------------------------------------------------
  spark-worker:
    image: bitnami/spark:3.5.0
    container_name: recsys-spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "8081:8081"
    volumes:
      - ./data:/app/data
      - ./spark:/app/spark
      - ./kafka:/app/kafka
    networks:
      - recsys-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Airflow Database (PostgreSQL)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:13
    container_name: recsys-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow_password
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - recsys-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Airflow Webserver & Scheduler
  # ---------------------------------------------------------------------------
  airflow-webserver:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: recsys-airflow-webserver
    depends_on:
      - postgres
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow_password@postgres:5432/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    ports:
      - "8082:8080"  # Map to 8082 to avoid collision with Spark Master on 8080
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
    networks:
      - recsys-network
    command: bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com && airflow webserver"
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: recsys-airflow-scheduler
    depends_on:
      - postgres
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow_password@postgres:5432/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
    networks:
      - recsys-network
    command: airflow scheduler
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MLflow
  # ---------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.0
    container_name: recsys-mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql+psycopg2://airflow:airflow_password@postgres:5432/airflow
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - recsys-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis (Cache & Rate Limiting)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2
    container_name: recsys-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - recsys-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # API Gateway
  # ---------------------------------------------------------------------------
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: recsys-api-gateway
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - USER_SERVICE_URL=http://user-service:8001
      - EVENT_SERVICE_URL=http://event-service:8002
    depends_on:
      - redis
    networks:
      - recsys-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # User Service
  # ---------------------------------------------------------------------------
  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: recsys-user-service
    ports:
      - "8001:8001"
    environment:
      - POSTGRES_URL=postgresql+asyncpg://airflow:airflow_password@postgres:5432/airflow
    depends_on:
      - postgres
    networks:
      - recsys-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Event Service
  # ---------------------------------------------------------------------------
  event-service:
    build:
      context: .
      dockerfile: services/event-service/Dockerfile
    container_name: recsys-event-service
    ports:
      - "8002:8002"
    environment:
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_TOPIC=user-events
    depends_on:
      - kafka
    networks:
      - recsys-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Model Service
  # ---------------------------------------------------------------------------
  model-service:
    build:
      context: .
      dockerfile: services/model-service/Dockerfile
    container_name: recsys-model-service
    ports:
      - "8004:8004"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
      - postgres
    networks:
      - recsys-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Recommendation Service
  # ---------------------------------------------------------------------------
  recommendation-service:
    build:
      context: .
      dockerfile: services/recommendation-service/Dockerfile
    container_name: recsys-recommendation-service
    ports:
      - "8003:8003"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MODEL_SERVICE_URL=http://model-service:8004
      - EXPERIMENTATION_SERVICE_URL=http://experimentation-service:8005
    depends_on:
      - model-service
      - redis
    networks:
      - recsys-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Experimentation Service
  # ---------------------------------------------------------------------------
  experimentation-service:
    build:
      context: .
      dockerfile: services/experimentation-service/Dockerfile
    container_name: recsys-experimentation-service
    ports:
      - "8005:8005"
    environment:
      - DATABASE_URL=postgresql+asyncpg://recsys:recsys_pass@postgres:5432/recsys_db
    depends_on:
      - postgres
    networks:
      - recsys-network
    restart: unless-stopped

  # =============================================================================
  # Monitoring Stack
  # =============================================================================
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: recsys-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
    networks:
      - recsys-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.0
    container_name: recsys-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - recsys-network
    restart: unless-stopped

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: recsys-kafka-exporter
    command: ["--kafka.server=kafka:9092"]
    ports:
      - "9308:9308"
    depends_on:
      - kafka
    networks:
      - recsys-network
    restart: unless-stopped

# =============================================================================
# Volumes
# =============================================================================
volumes:
  zookeeper-data:
    driver: local
  zookeeper-logs:
    driver: local
  kafka-data:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
  mlflow-artifacts:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  recsys-network:
    driver: bridge
    name: recsys-network
